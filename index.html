<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Columbia Card Task</title>
<style>
  body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #fff; }
  .msg { text-align: center; color: #333; max-width: 480px; padding: 0 20px; }
  .msg h1 { font-weight: normal; font-size: 22px; }
</style>
</head>
<body>
<div class="msg" id="msg">
  <p>Loading the experiment&hellip;</p>
  <p><small>If you are not redirected, <a id="manual" href="#">click here</a>.</small></p>
</div>

<script>
// ---------- Minimal ZIP writer (store / no compression) ----------
function crc32(bytes) {
  var table = crc32.table;
  if (!table) {
    table = new Uint32Array(256);
    for (var n = 0; n < 256; n++) {
      var c = n;
      for (var k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
      table[n] = c >>> 0;
    }
    crc32.table = table;
  }
  var crc = 0xFFFFFFFF;
  for (var i = 0; i < bytes.length; i++) crc = (crc >>> 8) ^ table[(crc ^ bytes[i]) & 0xFF];
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

function buildZip(files) {
  // files: [{name: string, data: Uint8Array}]
  var enc = new TextEncoder();
  var now = new Date();
  var dosTime = ((now.getHours() & 0x1F) << 11) | ((now.getMinutes() & 0x3F) << 5) | (Math.floor(now.getSeconds() / 2) & 0x1F);
  var dosDate = (((now.getFullYear() - 1980) & 0x7F) << 9) | (((now.getMonth() + 1) & 0x0F) << 5) | (now.getDate() & 0x1F);

  var locals = [];
  var centrals = [];
  var offset = 0;

  files.forEach(function(f) {
    var nameBytes = enc.encode(f.name);
    var crc = crc32(f.data);
    var size = f.data.length;

    var lh = new Uint8Array(30 + nameBytes.length + size);
    var dv = new DataView(lh.buffer);
    dv.setUint32(0, 0x04034b50, true);
    dv.setUint16(4, 20, true);
    dv.setUint16(6, 0, true);
    dv.setUint16(8, 0, true);
    dv.setUint16(10, dosTime, true);
    dv.setUint16(12, dosDate, true);
    dv.setUint32(14, crc, true);
    dv.setUint32(18, size, true);
    dv.setUint32(22, size, true);
    dv.setUint16(26, nameBytes.length, true);
    dv.setUint16(28, 0, true);
    lh.set(nameBytes, 30);
    lh.set(f.data, 30 + nameBytes.length);
    locals.push(lh);

    var cd = new Uint8Array(46 + nameBytes.length);
    var cdv = new DataView(cd.buffer);
    cdv.setUint32(0, 0x02014b50, true);
    cdv.setUint16(4, 20, true);
    cdv.setUint16(6, 20, true);
    cdv.setUint16(8, 0, true);
    cdv.setUint16(10, 0, true);
    cdv.setUint16(12, dosTime, true);
    cdv.setUint16(14, dosDate, true);
    cdv.setUint32(16, crc, true);
    cdv.setUint32(20, size, true);
    cdv.setUint32(24, size, true);
    cdv.setUint16(28, nameBytes.length, true);
    cdv.setUint16(30, 0, true);
    cdv.setUint16(32, 0, true);
    cdv.setUint16(34, 0, true);
    cdv.setUint16(36, 0, true);
    cdv.setUint32(38, 0, true);
    cdv.setUint32(42, offset, true);
    cd.set(nameBytes, 46);
    centrals.push(cd);

    offset += lh.length;
  });

  var cdSize = centrals.reduce(function(s, c) { return s + c.length; }, 0);
  var cdOffset = offset;

  var eocd = new Uint8Array(22);
  var edv = new DataView(eocd.buffer);
  edv.setUint32(0, 0x06054b50, true);
  edv.setUint16(4, 0, true);
  edv.setUint16(6, 0, true);
  edv.setUint16(8, files.length, true);
  edv.setUint16(10, files.length, true);
  edv.setUint32(12, cdSize, true);
  edv.setUint32(16, cdOffset, true);
  edv.setUint16(20, 0, true);

  return new Blob(locals.concat(centrals).concat([eocd]), {type: 'application/zip'});
}

function downloadBlob(filename, blob) {
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}

// ---------- Main ----------
(function() {
  var params = new URLSearchParams(window.location.search);

  if (params.get('cct_done') === '1') {
    // Final stop: gather stashed CSVs, build a single zip, download it.
    var enc = new TextEncoder();
    var files = [];
    for (var i = 0; i < 10; i++) {
      var csv = localStorage.getItem('cct_csv_' + i);
      var name = localStorage.getItem('cct_name_' + i);
      if (csv && name) {
        files.push({ name: name, data: enc.encode(csv) });
      }
    }
    // Clear stash either way.
    for (var j = 0; j < 10; j++) {
      localStorage.removeItem('cct_csv_' + j);
      localStorage.removeItem('cct_name_' + j);
    }
    if (files.length > 0) {
      var zip = buildZip(files);
      downloadBlob('CCT_Results.zip', zip);
    }
    document.getElementById('msg').innerHTML =
      '<h1>Thank you for participating!</h1>' +
      '<p>Your data has been saved. You may close this window.</p>';
    return;
  }

  // Fresh launch: clear any leftover stash and redirect to first task.
  try {
    for (var k = 0; k < 10; k++) {
      localStorage.removeItem('cct_csv_' + k);
      localStorage.removeItem('cct_name_' + k);
    }
  } catch (e) {}

  var order = Math.random() < 0.5 ? ['hot', 'cold'] : ['cold', 'hot'];
  var orderStr = order.join(',');
  var firstUrl = '../columbia-card-task-' + order[0] + '/index.html'
                 + '?cct_order=' + encodeURIComponent(orderStr) + '&cct_i=0';
  document.getElementById('manual').href = firstUrl;
  window.location.replace(firstUrl);
})();
</script>
</body>
</html>
