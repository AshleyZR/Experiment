<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Columbia Card Task</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #fff; }
  body { font-family: sans-serif; }
  #intro, #thanks { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; text-align: center; padding: 0 20px; }
  #intro p, #thanks p { max-width: 560px; color: #333; }
  button.primary {
    font-size: 18px; padding: 12px 28px; cursor: pointer;
    border: none; border-radius: 6px; background: #2563eb; color: #fff;
  }
  button.primary:hover { background: #1d4ed8; }
  iframe#exp { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; display: block; background: #fff; }
</style>
</head>
<body>

<div id="intro">
  <h1 style="font-weight:normal;">Columbia Card Task</h1>
  <p>You will complete two short tasks back-to-back. The experiment will run in fullscreen.</p>
  <p><button class="primary" id="start">Launch Experiment</button></p>
</div>

<div id="thanks" style="display:none;">
  <h1 style="font-weight:normal;">Thank you for participating!</h1>
  <p>Your data has been saved. You may close this window.</p>
</div>

<script>
// ---------- Minimal ZIP writer (store / no compression) ----------
function crc32(bytes) {
  var table = crc32.table;
  if (!table) {
    table = new Uint32Array(256);
    for (var n = 0; n < 256; n++) {
      var c = n;
      for (var k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
      table[n] = c >>> 0;
    }
    crc32.table = table;
  }
  var crc = 0xFFFFFFFF;
  for (var i = 0; i < bytes.length; i++) crc = (crc >>> 8) ^ table[(crc ^ bytes[i]) & 0xFF];
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

function buildZip(files) {
  var enc = new TextEncoder();
  var now = new Date();
  var dosTime = ((now.getHours() & 0x1F) << 11) | ((now.getMinutes() & 0x3F) << 5) | (Math.floor(now.getSeconds() / 2) & 0x1F);
  var dosDate = (((now.getFullYear() - 1980) & 0x7F) << 9) | (((now.getMonth() + 1) & 0x0F) << 5) | (now.getDate() & 0x1F);

  var locals = [];
  var centrals = [];
  var offset = 0;

  files.forEach(function(f) {
    var nameBytes = enc.encode(f.name);
    var crc = crc32(f.data);
    var size = f.data.length;

    var lh = new Uint8Array(30 + nameBytes.length + size);
    var dv = new DataView(lh.buffer);
    dv.setUint32(0, 0x04034b50, true);
    dv.setUint16(4, 20, true);
    dv.setUint16(6, 0, true);
    dv.setUint16(8, 0, true);
    dv.setUint16(10, dosTime, true);
    dv.setUint16(12, dosDate, true);
    dv.setUint32(14, crc, true);
    dv.setUint32(18, size, true);
    dv.setUint32(22, size, true);
    dv.setUint16(26, nameBytes.length, true);
    dv.setUint16(28, 0, true);
    lh.set(nameBytes, 30);
    lh.set(f.data, 30 + nameBytes.length);
    locals.push(lh);

    var cd = new Uint8Array(46 + nameBytes.length);
    var cdv = new DataView(cd.buffer);
    cdv.setUint32(0, 0x02014b50, true);
    cdv.setUint16(4, 20, true);
    cdv.setUint16(6, 20, true);
    cdv.setUint16(8, 0, true);
    cdv.setUint16(10, 0, true);
    cdv.setUint16(12, dosTime, true);
    cdv.setUint16(14, dosDate, true);
    cdv.setUint32(16, crc, true);
    cdv.setUint32(20, size, true);
    cdv.setUint32(24, size, true);
    cdv.setUint16(28, nameBytes.length, true);
    cdv.setUint16(30, 0, true);
    cdv.setUint16(32, 0, true);
    cdv.setUint16(34, 0, true);
    cdv.setUint16(36, 0, true);
    cdv.setUint32(38, 0, true);
    cdv.setUint32(42, offset, true);
    cd.set(nameBytes, 46);
    centrals.push(cd);

    offset += lh.length;
  });

  var cdSize = centrals.reduce(function(s, c) { return s + c.length; }, 0);
  var cdOffset = offset;

  var eocd = new Uint8Array(22);
  var edv = new DataView(eocd.buffer);
  edv.setUint32(0, 0x06054b50, true);
  edv.setUint16(4, 0, true);
  edv.setUint16(6, 0, true);
  edv.setUint16(8, files.length, true);
  edv.setUint16(10, files.length, true);
  edv.setUint32(12, cdSize, true);
  edv.setUint32(16, cdOffset, true);
  edv.setUint16(20, 0, true);

  return new Blob(locals.concat(centrals).concat([eocd]), {type: 'application/zip'});
}

function downloadBlob(filename, blob) {
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}

function clearStash() {
  for (var i = 0; i < 10; i++) {
    localStorage.removeItem('cct_csv_' + i);
    localStorage.removeItem('cct_name_' + i);
  }
}

function exitFullscreen() {
  if (document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement) {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
  }
}

function finishExperiment() {
  var enc = new TextEncoder();
  var files = [];
  for (var i = 0; i < 10; i++) {
    var csv = localStorage.getItem('cct_csv_' + i);
    var name = localStorage.getItem('cct_name_' + i);
    if (csv && name) files.push({ name: name, data: enc.encode(csv) });
  }
  clearStash();
  if (files.length > 0) {
    downloadBlob('CCT_Results.zip', buildZip(files));
  }
  exitFullscreen();
  document.getElementById('intro').style.display = 'none';
  var iframe = document.getElementById('exp');
  if (iframe) iframe.remove();
  document.getElementById('thanks').style.display = 'flex';
}

// ---------- Main ----------
(function() {
  var params = new URLSearchParams(window.location.search);

  // If loaded INSIDE the iframe with cct_done=1 (the final task redirected us here),
  // bubble up to the parent launcher so it can manage fullscreen exit + zip download.
  if (params.get('cct_done') === '1') {
    if (window.parent && window.parent !== window) {
      try { window.parent.postMessage('cct_done', '*'); } catch (e) {}
      document.body.innerHTML = '';
    } else {
      // Loaded standalone (no parent launcher) — handle directly.
      document.getElementById('intro').style.display = 'none';
      finishExperiment();
    }
    return;
  }

  // Fresh launch in the top window: clear stash, prepare order, wait for click.
  clearStash();
  var order = Math.random() < 0.5 ? ['hot', 'cold'] : ['cold', 'hot'];
  var orderStr = order.join(',');
  var firstUrl = 'columbia-card-task-' + order[0] + '/index.html'
                 + '?cct_order=' + encodeURIComponent(orderStr) + '&cct_i=0';

  window.addEventListener('message', function(e) {
    if (e.data === 'cct_done') finishExperiment();
  });

  document.getElementById('start').addEventListener('click', function() {
    var el = document.documentElement;
    var req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
    if (req) {
      try { req.call(el); } catch (e) {}
    }
    document.getElementById('intro').style.display = 'none';
    var iframe = document.createElement('iframe');
    iframe.id = 'exp';
    iframe.allow = 'fullscreen';
    iframe.allowFullscreen = true;
    iframe.src = firstUrl;
    document.body.appendChild(iframe);
  });
})();
</script>
</body>
</html>
